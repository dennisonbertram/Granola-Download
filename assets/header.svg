<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <filter id="watercolor" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="6" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="35" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" seed="1"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <!-- Warm paper background -->
  <rect width="1200" height="400" fill="#faf6f0"/>

  <!-- Watercolor washes -->
  <g filter="url(#watercolor)" opacity="0.7">
    <!-- Golden yellow wash -->
    <ellipse cx="200" cy="200" rx="280" ry="200" fill="#e8b84b" filter="url(#blur2)" opacity="0.5"/>

    <!-- Warm amber -->
    <ellipse cx="500" cy="150" rx="250" ry="180" fill="#d4894a" filter="url(#blur2)" opacity="0.4"/>

    <!-- Sage green -->
    <ellipse cx="800" cy="250" rx="300" ry="190" fill="#8aab7c" filter="url(#blur1)" opacity="0.45"/>

    <!-- Soft cream highlight -->
    <ellipse cx="400" cy="300" rx="200" ry="120" fill="#f0d9a0" filter="url(#blur2)" opacity="0.5"/>

    <!-- Light amber accent -->
    <ellipse cx="1000" cy="150" rx="220" ry="160" fill="#c4784a" filter="url(#blur1)" opacity="0.3"/>

    <!-- Soft green overlay -->
    <ellipse cx="650" cy="100" rx="180" ry="130" fill="#a8c49a" filter="url(#blur2)" opacity="0.35"/>

    <!-- Warm gold bottom -->
    <ellipse cx="300" cy="350" rx="350" ry="100" fill="#daa54b" filter="url(#blur2)" opacity="0.3"/>

    <!-- Subtle rose -->
    <ellipse cx="950" cy="320" rx="200" ry="120" fill="#c49a7a" filter="url(#blur1)" opacity="0.25"/>
  </g>

  <!-- Paper texture overlay -->
  <rect width="1200" height="400" filter="url(#paper)" opacity="0.08"/>
</svg>
